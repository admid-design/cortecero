name: frontend-smoke

on:
  pull_request:
  push:
    branches:
      - main
      - r1-fixes
  workflow_dispatch:

jobs:
  frontend-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm install

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""

      - name: Run frontend tests
        run: npm test
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""
