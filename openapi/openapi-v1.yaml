  # -------------------------------------------------------------------------
  # ROUTING POC — Bloque B: Planificación dispatcher
  # -------------------------------------------------------------------------

  /drivers:
    get:
      tags: [Drivers]
      summary: Listar choferes
      description: >
        Retorna choferes del tenant con filtros opcionales. Sin side effects.
        Requiere rol office, logistics o admin.
      parameters:
        - in: query
          name: active
          schema:
            type: boolean
          description: Filtrar por estado activo/inactivo
        - in: query
          name: vehicle_id
          schema:
            type: string
            format: uuid
          description: Filtrar por vehículo asignado
      responses:
        "200":
          description: Lista de choferes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriversListResponse'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos

    post:
      tags: [Drivers]
      summary: Crear chofer
      description: >
        Crea un nuevo chofer en el tenant. El teléfono debe ser único por tenant.
        El vehicle_id, si se proporciona, debe pertenecer al tenant y estar activo.
        Requiere rol logistics o admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverCreateRequest'
      responses:
        "201":
          description: Chofer creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverOut'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos (requiere logistics o admin)
        "404":
          description: ENTITY_NOT_FOUND — Vehículo no encontrado o inactivo
        "409":
          description: RESOURCE_CONFLICT — Ya existe un chofer con ese teléfono
        "422":
          description: INVALID_DRIVER — name o phone vacío

  /drivers/{driver_id}:
    get:
      tags: [Drivers]
      summary: Detalle de chofer
      description: >
        Retorna los datos de un chofer por ID. Sin side effects.
        Requiere rol office, logistics o admin.
      parameters:
        - in: path
          name: driver_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chofer encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverOut'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos
        "404":
          description: ENTITY_NOT_FOUND — Chofer no encontrado

    patch:
      tags: [Drivers]
      summary: Actualizar chofer
      description: >
        Actualiza campos del chofer (partial update). Al menos un campo debe
        enviarse. El teléfono debe seguir siendo único por tenant.
        Requiere rol logistics o admin.
      parameters:
        - in: path
          name: driver_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverUpdateRequest'
      responses:
        "200":
          description: Chofer actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverOut'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos (requiere logistics o admin)
        "404":
          description: ENTITY_NOT_FOUND — Chofer o vehículo no encontrado
        "409":
          description: RESOURCE_CONFLICT — Teléfono duplicado en el tenant
        "422":
          description: INVALID_DRIVER — name o phone vacío; o sin cambios a aplicar

  /orders/ready-to-dispatch:
    get:
      tags: [Routing]
      summary: Pedidos listos para asignar a ruta
      description: >
        Retorna pedidos en estado `planned` del tenant, opcionalmente filtrados
        por fecha de servicio. Sin side effects.
        Requiere rol logistics o admin.
      parameters:
        - in: query
          name: service_date
          schema:
            type: string
            format: date
          description: Filtrar por fecha de servicio (YYYY-MM-DD)
      responses:
        "200":
          description: Lista de pedidos listos para despacho
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyToDispatchResponse'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos

  /vehicles/available:
    get:
      tags: [Routing]
      summary: Vehículos activos disponibles para planificar
      description: >
        Retorna vehículos activos del tenant con su chofer asignado (si existe).
        Sin side effects. Requiere rol logistics o admin.
      parameters:
        - in: query
          name: service_date
          schema:
            type: string
            format: date
          description: Reservado para futura comprobación de disponibilidad por fecha
      responses:
        "200":
          description: Lista de vehículos disponibles con chofer asignado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableVehiclesResponse'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos

  /routes/plan:
    post:
      tags: [Routing]
      summary: Generar plan de rutas
      description: >
        Crea una o más rutas para un plan dado. Cada entrada en `routes`
        produce una `Route` con sus `RouteStop` ordenadas. Actualiza
        `order.status = assigned`. Si ya existía una ruta activa para el mismo
        (plan, vehicle), la cancela y crea nueva versión (replanificación).
        Requiere rol logistics o admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRoutesRequest'
      responses:
        "201":
          description: Rutas creadas / replanificadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanRoutesResponse'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos (requiere logistics o admin)
        "404":
          description: ENTITY_NOT_FOUND — Plan, vehículo, chofer o pedido no encontrado
        "409":
          description: RESOURCE_CONFLICT — Error de integridad al persistir
        "422":
          description: >
            INVALID_PLAN — plan_id, service_date o routes faltante/inválido.
            INVALID_ROUTE — vehicle_id vacío, order_ids vacío o UUID inválido.
            INVALID_STATE_TRANSITION — Plan o pedido en estado incorrecto.

  /routes:
    get:
      tags: [Routing]
      summary: Listar rutas
      description: >
        Lista rutas del tenant con filtros opcionales. Sin side effects.
        Ordena por service_date desc, created_at desc.
        Requiere rol office, logistics o admin.
      parameters:
        - in: query
          name: plan_id
          schema:
            type: string
            format: uuid
          description: Filtrar por plan
        - in: query
          name: vehicle_id
          schema:
            type: string
            format: uuid
          description: Filtrar por vehículo
        - in: query
          name: driver_id
          schema:
            type: string
            format: uuid
          description: Filtrar por chofer
        - in: query
          name: service_date
          schema:
            type: string
            format: date
          description: Filtrar por fecha de servicio
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, planned, dispatched, in_progress, completed, cancelled]
          description: Filtrar por estado de ruta
      responses:
        "200":
          description: Lista de rutas con paradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutesListResponse'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos
        "422":
          description: INVALID_FILTER — Valor de status no reconocido

  /driver/routes:
    get:
      tags: [Routing]
      summary: Listar rutas operativas para conductor
      description: >
        Lista rutas del tenant para operación de conductor.

        Scope por rol:
          - `driver`: solo rutas donde `route.driver_id` coincide con su ficha de chofer activa.
          - `logistics` y `admin`: sin recorte por chofer.

        Sin side effects.
      parameters:
        - in: query
          name: service_date
          schema:
            type: string
            format: date
          description: Filtrar por fecha de servicio
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, planned, dispatched, in_progress, completed, cancelled]
          description: Filtrar por estado de ruta
      responses:
        "200":
          description: Lista de rutas operativas para conductor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutesListResponse'
        "401":
          description: No autenticado
        "403":
          description: >
            RBAC_FORBIDDEN — Rol sin permisos.
            DRIVER_NOT_LINKED — Usuario driver sin ficha de chofer activa.
        "422":
          description: INVALID_FILTER — Valor de status no reconocido

  /routes/{route_id}:
    get:
      tags: [Routing]
      summary: Detalle de ruta con paradas
      description: >
        Retorna la ruta con sus paradas ordenadas por sequence_number.
        Sin side effects. Requiere rol office, logistics o admin.
      parameters:
        - in: path
          name: route_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ruta con paradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteOut'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos
        "404":
          description: ENTITY_NOT_FOUND — Ruta no encontrada

  /routes/{route_id}/next-stop:
    get:
      tags: [Routing]
      summary: Siguiente parada pendiente de la ruta
      description: >
        Retorna la primera parada de la ruta cuyo estado no es terminal
        (`completed`, `failed`, `skipped`) y la cantidad de paradas restantes.
        No tiene side effects.

        Requiere rol `driver`, `logistics` o `admin`.
        Para `driver`, el acceso está limitado a rutas donde `route.driver_id`
        coincide con su identidad de conductor.
      parameters:
        - in: path
          name: route_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Próxima parada y conteo de paradas pendientes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteNextStopResponse'
        "401":
          description: No autenticado
        "403":
          description: >
            RBAC_FORBIDDEN — Rol sin permisos.
            DRIVER_NOT_LINKED — Usuario driver sin ficha de chofer activa.
            DRIVER_SCOPE_FORBIDDEN — Ruta asignada a otro chofer.
        "404":
          description: ENTITY_NOT_FOUND — Ruta no encontrada

  /routes/{route_id}/dispatch:
    post:
      tags: [Routing]
      summary: Despachar ruta al chofer
      description: >
        Transición de estado: `planned → dispatched`.
        Actualiza `order.status = dispatched` para todos los pedidos de la ruta.
        Requiere rol logistics o admin.
      parameters:
        - in: path
          name: route_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ruta despachada con paradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteOut'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos (requiere logistics o admin)
        "404":
          description: ENTITY_NOT_FOUND — Ruta no encontrada
        "409":
          description: RESOURCE_CONFLICT — Error de integridad
        "422":
          description: >
            INVALID_STATE_TRANSITION — La ruta no está en estado 'planned'

  /routes/{route_id}/optimize:
    post:
      tags: [Routing]
      summary: Optimizar ruta (draft → planned)
      description: >
        Llama al proveedor de optimización configurado para calcular la secuencia
        óptima de paradas. Transición de estado: draft → planned.

        Selección de proveedor:
          - Si `GOOGLE_ROUTE_OPTIMIZATION_PROJECT_ID` está configurado:
            proveedor real Google Route Optimization (ADC/service account).
          - Si está vacío: proveedor mock (entornos dev/tests).

        Precondiciones:
          - La ruta debe existir y pertenecer al tenant del token.
          - La ruta debe estar en estado 'draft'.
          - Todos los clientes de los pedidos de la ruta deben tener lat y lng definidos.

        Efectos:
          - Reordena RouteStop.sequence_number según el resultado del optimizador.
          - Popula RouteStop.estimated_arrival_at en cada parada.
          - Persiste optimization_request_id y optimization_response_json en Route.
          - Emite evento route.planned (actor_type: system).
      operationId: optimizeRoute
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ruta optimizada y en estado 'planned'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteOut"
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos (requiere logistics o admin)
        "404":
          description: ENTITY_NOT_FOUND — Ruta no encontrada
        "409":
          description: >
            INVALID_STATE_TRANSITION — La ruta no está en estado 'draft'.
            OPTIMIZATION_PROVIDER_ERROR — El proveedor de optimización falló.
        "422":
          description: >
            MISSING_GEO — Uno o más pedidos tienen cliente sin coordenadas (lat/lng).
            El campo detail.message lista los order_ids afectados.
            INVALID_ROUTE — La ruta no tiene paradas.

  /routes/{route_id}/move-stop:
    post:
      tags: [Routing]
      summary: Mover parada entre rutas
      description: >
        Mueve un pedido (RouteStop) de esta ruta a otra ruta de destino.
        La parada se elimina de origen y se añade al final de destino.
        Solo paradas en estado `pending` pueden moverse.
        Ambas rutas deben estar en `planned` o `dispatched`.
        No incrementa version de ninguna ruta (ajuste manual del dispatcher).
        Requiere rol logistics o admin.
      parameters:
        - in: path
          name: route_id
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la ruta origen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveStopRequest'
      responses:
        "200":
          description: Parada movida exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoveStopResponse'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos (requiere logistics o admin)
        "404":
          description: ENTITY_NOT_FOUND — Ruta origen, parada o ruta destino no encontrada
        "409":
          description: RESOURCE_CONFLICT — Pedido ya existe en la ruta destino
        "422":
          description: >
            INVALID_MOVE — stop_id o target_route_id faltante/inválido.
            INVALID_STATE_TRANSITION — Parada no está en 'pending' o rutas en estado incompatible.

  /routes/{route_id}/events:
    get:
      tags: [Routing]
      summary: Log de eventos de una ruta
      description: >
        Retorna todos los eventos (RouteEvent) de la ruta ordenados
        cronológicamente. Append-only — no admite DELETE ni UPDATE.
        Sin side effects. Requiere rol office, logistics o admin.
      parameters:
        - in: path
          name: route_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista de eventos de la ruta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteEventsListResponse'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos
        "404":
          description: ENTITY_NOT_FOUND — Ruta no encontrada

  # -------------------------------------------------------------------------
  # ROUTING POC — Bloque D: Ejecución conductor (PWA, conectividad intermitente)
  # Auth D.2: driver + logistics/admin con scope por route.driver_id.
  # -------------------------------------------------------------------------

  /stops/{stop_id}/arrive:
    post:
      tags: [Routing]
      summary: Registrar llegada a parada
      description: >
        El chofer registra su llegada a la parada.
        Transición: `pending | en_route → arrived`.

        Primera llegada en ruta `dispatched` dispara `dispatched → in_progress`.

        **Idempotencia:** si se envía `idempotency_key` y ya existe un evento
        `stop.arrived` con esa clave para esta parada → 200 con estado actual.
        Si la parada ya está en `arrived` sin clave → 200.
        Estado terminal o incompatible → 409.

        Requiere rol `driver`, `logistics` o `admin`.
        Para `driver`, el acceso está limitado a rutas donde `route.driver_id`
        coincide con su identidad de conductor.
      parameters:
        - in: path
          name: stop_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteStopArriveRequest'
      responses:
        "200":
          description: Llegada registrada (o idempotente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteStopOut'
        "401":
          description: No autenticado
        "403":
          description: >
            RBAC_FORBIDDEN — Rol sin permisos.
            DRIVER_NOT_LINKED — Usuario driver sin ficha de chofer activa.
            DRIVER_SCOPE_FORBIDDEN — Ruta asignada a otro chofer.
        "404":
          description: ENTITY_NOT_FOUND — Parada o ruta no encontrada
        "409":
          description: >
            INVALID_STATE_TRANSITION — Parada en estado terminal o incompatible.
            La ruta no está en dispatched ni in_progress.

  /stops/{stop_id}/complete:
    post:
      tags: [Routing]
      summary: Confirmar entrega en parada
      description: >
        El chofer confirma que la entrega fue exitosa.
        Transición: `arrived → completed`.
        Actualiza `order.status = delivered`.
        Si todas las paradas de la ruta quedan en estado terminal →
        ruta pasa automáticamente a `completed`.

        **Idempotencia:** misma `idempotency_key` → 200.
        Parada ya en `completed` → 200.
        Estado incompatible → 409.

        Requiere rol `driver`, `logistics` o `admin`.
        Para `driver`, el acceso está limitado a rutas donde `route.driver_id`
        coincide con su identidad de conductor.
      parameters:
        - in: path
          name: stop_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteStopCompleteRequest'
      responses:
        "200":
          description: Entrega confirmada (o idempotente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteStopOut'
        "401":
          description: No autenticado
        "403":
          description: >
            RBAC_FORBIDDEN — Rol sin permisos.
            DRIVER_NOT_LINKED — Usuario driver sin ficha de chofer activa.
            DRIVER_SCOPE_FORBIDDEN — Ruta asignada a otro chofer.
        "404":
          description: ENTITY_NOT_FOUND — Parada o ruta no encontrada
        "409":
          description: >
            INVALID_STATE_TRANSITION — Parada no está en 'arrived' o ruta en estado incompatible.

  /stops/{stop_id}/fail:
    post:
      tags: [Routing]
      summary: Registrar entrega fallida en parada
      description: >
        El chofer reporta que la entrega no pudo realizarse.
        Transición: `arrived → failed`. `failure_reason` es obligatorio.
        Actualiza `order.status = failed_delivery`.
        Si todas las paradas quedan en estado terminal →
        ruta pasa automáticamente a `completed`.

        **Idempotencia:** misma `idempotency_key` → 200.
        Parada ya en `failed` → 200.
        Estado incompatible → 409.

        Requiere rol `driver`, `logistics` o `admin`.
        Para `driver`, el acceso está limitado a rutas donde `route.driver_id`
        coincide con su identidad de conductor.
      parameters:
        - in: path
          name: stop_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteStopFailRequest'
      responses:
        "200":
          description: Entrega fallida registrada (o idempotente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteStopOut'
        "401":
          description: No autenticado
        "403":
          description: >
            RBAC_FORBIDDEN — Rol sin permisos.
            DRIVER_NOT_LINKED — Usuario driver sin ficha de chofer activa.
            DRIVER_SCOPE_FORBIDDEN — Ruta asignada a otro chofer.
        "404":
          description: ENTITY_NOT_FOUND — Parada o ruta no encontrada
        "409":
          description: >
            INVALID_STATE_TRANSITION — Parada no está en 'arrived' o ruta en estado incompatible.
        "422":
          description: INVALID_DRIVER — failure_reason es obligatorio

  /stops/{stop_id}/skip:
    post:
      tags: [Routing]
      summary: Omitir parada en ejecución
      description: >
        Omite una parada durante la ejecución de ruta.
        Transición: `pending | en_route | arrived → skipped`.

        Si la ruta está en `dispatched`, esta transición también marca inicio
        de ejecución (`route.started`) y pasa la ruta a `in_progress`.
        Si todas las paradas quedan terminales, la ruta se auto-completa.

        Requiere rol `driver`, `logistics` o `admin`.
        Para `driver`, el acceso está limitado a rutas donde `route.driver_id`
        coincide con su identidad de conductor.
      parameters:
        - in: path
          name: stop_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteStopSkipRequest'
      responses:
        "200":
          description: Parada omitida (o idempotente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteStopOut'
        "401":
          description: No autenticado
        "403":
          description: >
            RBAC_FORBIDDEN — Rol sin permisos.
            DRIVER_NOT_LINKED — Usuario driver sin ficha de chofer activa.
            DRIVER_SCOPE_FORBIDDEN — Ruta asignada a otro chofer.
        "404":
          description: ENTITY_NOT_FOUND — Parada o ruta no encontrada
        "409":
          description: >
            INVALID_STATE_TRANSITION — Estado incompatible de parada o ruta.

  /incidents:
    post:
      tags: [Incidents]
      summary: Registrar incidencia en ruta
      description: >
        El chofer reporta una incidencia durante la ejecución de la ruta.
        `driver_id` se infiere automáticamente de `route.driver_id`.
        La ruta debe existir y tener un chofer asignado.
        La ruta debe estar en estado `dispatched`, `in_progress` o `completed`.

        **Idempotencia:** si se envía `idempotency_key` y ya existe un evento
        `incident.reported` con esa clave para la misma ruta → 200 con la
        incidencia original. Sin clave o sin coincidencia → 201.

        Requiere rol `driver`, `logistics` o `admin`.
        Para `driver`, el acceso está limitado a rutas donde `route.driver_id`
        coincide con su identidad de conductor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentCreateRequest'
      responses:
        "201":
          description: Incidencia creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentOut'
        "200":
          description: Incidencia idempotente — ya existía con esa clave
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentOut'
        "401":
          description: No autenticado
        "403":
          description: >
            RBAC_FORBIDDEN — Rol sin permisos.
            DRIVER_NOT_LINKED — Usuario driver sin ficha de chofer activa.
            DRIVER_SCOPE_FORBIDDEN — Ruta asignada a otro chofer.
        "404":
          description: ENTITY_NOT_FOUND — Ruta o parada no encontrada
        "409":
          description: RESOURCE_CONFLICT — Error de integridad al persistir
        "422":
          description: >
            MISSING_DRIVER — La ruta no tiene chofer asignado.
            INVALID_STATE_TRANSITION — Ruta en estado incompatible.

    get:
      tags: [Incidents]
      summary: Listar incidencias
      description: >
        Lista incidencias del tenant. Filtrar por route_id es recomendado.
        Sin side effects. Requiere rol office, logistics o admin.
      parameters:
        - in: query
          name: route_id
          schema:
            type: string
            format: uuid
          description: Filtrar por ruta (recomendado)
      responses:
        "200":
          description: Lista de incidencias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentsListResponse'
        "401":
          description: No autenticado
        "403":
          description: Rol sin permisos

  /incidents/{incident_id}/review:
    post:
      tags: [Incidents]
      summary: Revisar incidencia
      description: >
        Marca una incidencia como `reviewed`.
        Transición válida: `open → reviewed`.

        Comportamiento:
          - Si ya está en `reviewed`: 200 idempotente.
          - Si ya está en `resolved`: 409 INVALID_STATE_TRANSITION.

        Requiere rol `logistics` o `admin`.
      parameters:
        - in: path
          name: incident_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Incidencia revisada (o idempotente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentOut'
        "401":
          description: No autenticado
        "403":
          description: RBAC_FORBIDDEN — Rol sin permisos
        "404":
          description: ENTITY_NOT_FOUND — Incidencia no encontrada
        "409":
          description: INVALID_STATE_TRANSITION — Incidencia ya resuelta

  /incidents/{incident_id}/resolve:
    post:
      tags: [Incidents]
      summary: Resolver incidencia
      description: >
        Marca una incidencia como `resolved`.
        Transición válida: `reviewed → resolved`.

        Comportamiento:
          - Si ya está en `resolved`: 200 idempotente.
          - Si está en `open`: 409 INVALID_STATE_TRANSITION.

        Requiere rol `logistics` o `admin`.
      parameters:
        - in: path
          name: incident_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentResolveRequest'
      responses:
        "200":
          description: Incidencia resuelta (o idempotente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentOut'
        "401":
          description: No autenticado
        "403":
          description: RBAC_FORBIDDEN — Rol sin permisos
        "404":
          description: ENTITY_NOT_FOUND — Incidencia no encontrada
        "409":
          description: INVALID_STATE_TRANSITION — Solo incidencias reviewed pueden resolverse
        "422":
          description: INVALID_INPUT — resolution_note es obligatorio

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    OrderIngestionInput:
      type: object
