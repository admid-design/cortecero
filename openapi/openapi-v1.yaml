    put:
      tags: [Admin Customers]
      summary: Reemplazar (upsert) perfil operativo del cliente
      description: >
        PUT opera como upsert y reemplazo completo: crea el perfil si no existe o reemplaza
        todos sus campos si ya existe. Para limpiar campos opcionales se envía null explícito.
      parameters:
        - in: path
          name: customer_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerOperationalProfilePutRequest'
      responses:
        "200":
          description: Perfil operativo actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerOperationalProfile'
        "403":
          description: Rol sin permisos de escritura
        "404":
          description: Cliente no encontrado
        "422":
