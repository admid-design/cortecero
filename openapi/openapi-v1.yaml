            - customer_rejected
            - vehicle_issue
            - wrong_address
            - damaged_goods
            - other
        severity:
          type: string
          enum: [low, medium, high, critical]
        description:
          type: string
        status:
          type: string
          enum: [open, reviewed, resolved]
        reported_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolution_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IncidentsListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IncidentOut'
        total:
          type: integer

    RouteEventOut:
      type: object
      required: [id, route_id, event_type, actor_type, ts, metadata_json]
      properties:
        id:
          type: string
          format: uuid
        route_id:
          type: string
          format: uuid
        route_stop_id:
          type: string
          format: uuid
          nullable: true
        event_type:
          type: string
          description: >
            Valores posibles: route.created, route.planned, route.dispatched, route.started,
            route.completed, route.cancelled, stop.arrived, stop.completed,
            stop.failed, stop.skipped, stop.en_route, incident.reported,
            incident.reviewed, incident.resolved
        actor_type:
          type: string
          enum: [dispatcher, driver, system]
        actor_id:
          type: string
          format: uuid
          nullable: true
        ts:
          type: string
          format: date-time
          description: Timestamp del evento (UTC)
        metadata_json:
          type: object
          description: Metadatos del evento (incluye idempotency_key cuando aplica)

    RouteEventsListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RouteEventOut'
        total:
          type: integer
