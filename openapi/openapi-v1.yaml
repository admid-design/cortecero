openapi: 3.1.0
info:
  title: CorteCero API
  version: 1.5.0
  description: >
    API MVP para control de cut-off, planes diarios por zona, pedidos tardíos,
    excepciones y auditoría.
    v1.1.0 — Extensión brownfield: Routing POC (Bloques B + D).
    Añade gestión de choferes, planificación y despacho de rutas, ejecución
    por conductor (arrive/complete/fail/skip), incidencias y vistas driver
    (Bloque C). Bloque E.2 habilita proveedor real Google Route Optimization
    con autenticación ADC y fallback a mock en entornos sin credenciales.
    Multi-tenant estricto.

servers:
  - url: https://api.cortecero.local

tags:
  - name: Auth
  - name: Orders
  - name: Plans
  - name: Exceptions
  - name: Dashboard
  - name: Audit
  - name: Exports
  - name: Admin Zones
  - name: Admin Products
  - name: Admin Customers
  - name: Admin Users
  - name: Admin Tenant Settings
  - name: Drivers
    description: Gestión de choferes del tenant (Routing POC)
  - name: Routing
    description: >
      Planificación y despacho de rutas (Bloque B) y ejecución por conductor
      (Bloques D + C). Auth real de conductor habilitada en D.2.
  - name: Incidents
    description: Registro y consulta de incidencias en ruta (Routing POC)

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login de usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_slug, email, password]
              properties:
                tenant_slug:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Token JWT emitido
          content:
            application/json:
              schema:
                type: object
                required: [access_token, token_type]
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: bearer

  /ingestion/orders:
    post:
      tags: [Orders]
      summary: Ingesta masiva o individual de pedidos
      description: >
        Crea o actualiza pedidos por clave lógica tenant + external_ref + service_date.
        Calcula is_late y effective_cutoff_at al ingresar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orders]
              properties:
                orders:
                  type: array
                  items:
                    $ref: '#/components/schemas/OrderIngestionInput'
      responses:
        "200":
          description: Resultado de ingesta
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                  updated:
                    type: integer
                  rejected:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        external_ref:
                          type: string
                        service_date:
                          type: string
                          format: date
                        result:
                          type: string
                          enum: [created, updated, rejected]
                        order_id:
                          type: string
                          format: uuid
                        reason:
                          type: string

  /orders:
    get:
      tags: [Orders]
      summary: Listado de pedidos
      parameters:
        - in: query
          name: service_date
          schema:
            type: string
            format: date
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [ingested, late_pending_exception, ready_for_planning, planned, exception_rejected]
        - in: query
          name: is_late
          schema:
            type: boolean
        - in: query
          name: external_ref
          schema:
            type: string
      responses:
        "200":
          description: Pedidos filtrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  total:
                    type: integer

  /orders/pending-queue:
    get:
      tags: [Orders]
      summary: Cola operativa de pendientes
      description: >
        Lista pedidos no elegibles para inclusión normal en plan para un service_date.
        Es una lectura derivada sin side effects.
      parameters:
        - in: query
          name: service_date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: reason
          schema:
            type: string
            enum: [LATE_PENDING_EXCEPTION, LOCKED_PLAN_EXCEPTION_REQUIRED, EXCEPTION_REJECTED]
      responses:
        "200":
          description: Pedidos pendientes operativos
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PendingQueueItem'
                  total:
                    type: integer

  /orders/operational-queue:
    get:
      tags: [Orders]
      summary: Cola operativa de restricciones
      description: >
        Lista pedidos con `operational_state=restricted` para un `service_date`,
        derivados de perfil/excepciones operativas de cliente, sin side effects.
        Orden determinista: prioridad de razón, `created_at` asc, `order_id` asc.
      parameters:
        - in: query
          name: service_date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: reason
          schema:
            type: string
            enum:
              - CUSTOMER_DATE_BLOCKED
              - CUSTOMER_NOT_ACCEPTING_ORDERS
              - OUTSIDE_CUSTOMER_WINDOW
              - INSUFFICIENT_LEAD_TIME
      responses:
        "200":
          description: Pedidos restringidos por reglas operativas de cliente
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OperationalQueueItem'
                  total:
                    type: integer
        "422":
          description: Filtro reason inválido (INVALID_OPERATIONAL_FILTER)

  /orders/operational-resolution-queue:
    get:
      tags: [Orders]
      summary: Cola de resolución operativa priorizada
      description: >
        Lista pedidos con `operational_state=restricted` para un `service_date`,
        ordenada para resolución: `severity`, `operational_reason`, `created_at`, `id`.
        Endpoint de solo lectura, sin side effects.
      parameters:
        - in: query
          name: service_date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: reason
          schema:
            type: string
            enum:
              - CUSTOMER_DATE_BLOCKED
              - CUSTOMER_NOT_ACCEPTING_ORDERS
              - OUTSIDE_CUSTOMER_WINDOW
              - INSUFFICIENT_LEAD_TIME
        - in: query
          name: severity
          schema:
            type: string
            enum: [critical, high, medium, low]
      responses:
        "200":
          description: Pedidos restringidos priorizados para resolución
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OperationalResolutionQueueItem'
                  total:
                    type: integer
        "422":
          description: Filtro inválido (INVALID_OPERATIONAL_FILTER)

  /orders/operational-snapshots/run:
    post:
      tags: [Orders]
      summary: Ejecutar persistencia de snapshots operativos por fecha
      description: >
        Recalcula evaluación operativa para pedidos del `service_date` y persiste
        snapshots append-only con idempotencia por `(order_id, evaluation_ts_bucket, rule_version)`.
      parameters:
        - in: query
          name: service_date
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Resultado de ejecución de snapshots operativos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationalSnapshotRunResponse'
        "403":
          description: RBAC_FORBIDDEN

  /orders/{order_id}/operational-snapshots:
    get:
      tags: [Orders]
      summary: Timeline de snapshots operativos por pedido
      description: >
        Devuelve la línea temporal append-only de snapshots de evaluación operativa
        para un pedido, ordenada cronológicamente (`evaluation_ts`, `id`), sin side effects.
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Timeline operativo del pedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderOperationalSnapshotsResponse'
        "404":
          description: ORDER_NOT_FOUND
        "422":
          description: INVALID_OPERATIONAL_FILTER

  /exports/operational-dataset:
    get:
      tags: [Exports]
      summary: Export operativo para analítica/IA
      description: >
        Export tenant-safe de dataset operativo derivado para una ventana de fechas.
        Incluye pedido, cliente, zona, explicación operativa y métricas de plan/peso.
        Soporta paginado y salida `json` o `csv`, sin side effects.
      parameters:
        - in: query
          name: date_from
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: anonymize
          schema:
            type: boolean
            default: false
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: Dataset operativo exportado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationalDatasetExportResponse'
            text/csv:
              schema:
                type: string
        "403":
          description: RBAC_FORBIDDEN
        "422":
          description: Filtro inválido (INVALID_EXPORT_FILTER)

  /orders/{order_id}:
    get:
      tags: [Orders]
      summary: Detalle de pedido
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/{order_id}/weight:
    patch:
      tags: [Orders]
      summary: Actualizar peso total del pedido
      description: >
        Permite fijar o limpiar (`null`) el peso total del pedido en kg.
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderWeightUpdateRequest'
      responses:
        "200":
          description: Pedido actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /plans:
    get:
      tags: [Plans]
      summary: Listado de planes por fecha/zona
      parameters:
        - in: query
          name: service_date
          schema:
            type: string
            format: date
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [open, locked, dispatched]
      responses:
        "200":
          description: Lista de planes
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'
                  total:
                    type: integer
    post:
      tags: [Plans]
      summary: Crear plan para fecha y zona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service_date, zone_id]
              properties:
                service_date:
                  type: string
                  format: date
                zone_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Plan creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  /plans/capacity-alerts:
    get:
      tags: [Plans]
      summary: Alertas de capacidad por plan
      description: >
        Lectura derivada de capacidad por plan con vehículo asignado.
        Reporta solo alertas (over o near) según ratio de carga.
      parameters:
        - in: query
          name: service_date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: level
          schema:
            type: string
            enum: [OVER_CAPACITY, NEAR_CAPACITY]
      responses:
        "200":
          description: Alertas de capacidad calculadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanCapacityAlertsResponse'
        "422":
          description: Filtro inválido

  /plans/{plan_id}:
    get:
      tags: [Plans]
      summary: Detalle de plan
      parameters:
        - in: path
          name: plan_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Plan encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  /plans/{plan_id}/customer-consolidation:
    get:
      tags: [Plans]
      summary: Consolidación operativa por cliente del plan
      description: >
        Lectura derivada de pedidos ya incluidos en el plan, agrupados por cliente.
        No muta el plan ni recalcula reglas de negocio.
        Orden determinista de clientes: `total_orders` desc, `customer_name` asc, `customer_id` asc.
      parameters:
        - in: path
          name: plan_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Consolidación por cliente para el plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanCustomerConsolidationResponse'
        "404":
          description: Plan no encontrado

  /plans/{plan_id}/vehicle:
    patch:
      tags: [Plans]
      summary: Asignar o limpiar vehículo del plan
      description: >
        Actualiza el vehículo asignado al plan. Si `vehicle_id` es `null`, limpia la asignación.
      parameters:
        - in: path
          name: plan_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanVehicleUpdateRequest'
      responses:
        "200":
          description: Plan actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        "404":
          description: Plan o vehículo no encontrado
        "422":
          description: Transición inválida (por ejemplo, vehículo inactivo)

  /plans/auto-lock/run:
    post:
      tags: [Plans]
      summary: Ejecutar auto-lock de planes elegibles
      description: >
        Bloquea planes open del tenant para el service_date objetivo (mañana en timezone del tenant)
        cuando auto_lock_enabled=true y la ventana horaria está alcanzada.
        Es idempotente: no re-bloquea planes ya locked/dispatched.
      responses:
        "200":
          description: Resultado de ejecución auto-lock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoLockRunResponse'

  /plans/{plan_id}/lock:
    post:
      tags: [Plans]
      summary: Bloquear un plan
      description: >
        Cambia el plan a locked. A partir de ese momento solo admite inclusión
        por excepción aprobada.
      parameters:
        - in: path
          name: plan_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Plan bloqueado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  /plans/{plan_id}/orders:
    post:
      tags: [Plans]
      summary: Incluir pedido en plan
      description: >
        Si el plan está open, admite pedidos ready_for_planning.
        Si el plan está locked, solo admite pedidos con excepción approved.
      parameters:
        - in: path
          name: plan_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id]
              properties:
                order_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Pedido incluido en plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanOrder'
        "409":
          description: Regla funcional impide inclusión

  /exceptions:
    post:
      tags: [Exceptions]
      summary: Crear solicitud de excepción
      description: >
        Crea excepción late_order para un pedido.
        Solo aplica si el pedido es tardío o si existe plan locked para su service_date y zona.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, type, note]
              properties:
                order_id:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [late_order]
                note:
                  type: string
      responses:
        "201":
          description: Excepción creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'

    get:
      tags: [Exceptions]
      summary: Listado de excepciones
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
        - in: query
          name: order_id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Excepciones filtradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Exception'
                  total:
                    type: integer

  /exceptions/{exception_id}/approve:
    post:
      tags: [Exceptions]
      summary: Aprobar excepción
      parameters:
        - in: path
          name: exception_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Excepción aprobada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'

  /exceptions/{exception_id}/reject:
    post:
      tags: [Exceptions]
      summary: Rechazar excepción
      parameters:
        - in: path
          name: exception_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Excepción rechazada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'

  /dashboard/daily-summary:
    get:
      tags: [Dashboard]
      summary: Resumen operativo diario
      parameters:
        - in: query
          name: service_date
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: KPIs del día
          content:
            application/json:
              schema:
                type: object
                properties:
                  service_date:
                    type: string
                    format: date
                  total_orders:
                    type: integer
                  late_orders:
                    type: integer
                  plans_open:
                    type: integer
                  plans_locked:
                    type: integer
                  pending_exceptions:
                    type: integer
                  approved_exceptions:
                    type: integer
                  rejected_exceptions:
                    type: integer

  /dashboard/source-metrics:
    get:
      tags: [Dashboard]
      summary: Métricas por origen de pedido
      description: >
        Métricas derivadas por source_channel para un rango de service_date (inclusive).
      parameters:
        - in: query
          name: date_from
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: KPIs por origen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSourceMetricsResponse'
        "422":
          description: Rango inválido (date_from > date_to)

  /audit:
    get:
      tags: [Audit]
      summary: Auditoría por entidad
      parameters:
        - in: query
          name: entity_type
          required: true
          schema:
            type: string
            enum: [order, exception, plan, plan_order, tenant]
        - in: query
          name: entity_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Eventos de auditoría
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  total:
                    type: integer

  /admin/zones:
    get:
      tags: [Admin Zones]
      summary: Listado de zonas del tenant
      parameters:
        - in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          description: Zonas filtradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZonesListResponse'
    post:
      tags: [Admin Zones]
      summary: Crear zona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoneCreateRequest'
      responses:
        "201":
          description: Zona creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
        "403":
          description: Rol sin permisos de escritura
        "409":
          description: Conflicto de nombre

  /admin/zones/{zone_id}:
    patch:
      tags: [Admin Zones]
      summary: Actualizar zona
      parameters:
        - in: path
          name: zone_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoneUpdateRequest'
      responses:
        "200":
          description: Zona actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
        "404":
          description: Zona no encontrada
        "409":
          description: Conflicto de nombre
        "422":
          description: Transición inválida

  /admin/zones/{zone_id}/deactivate:
    post:
      tags: [Admin Zones]
      summary: Desactivar zona
      parameters:
        - in: path
          name: zone_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Zona desactivada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
        "404":
          description: Zona no encontrada
        "422":
          description: No se puede desactivar por estado/regla de negocio

  /admin/customers:
    get:
      tags: [Admin Customers]
      summary: Listado de clientes del tenant
      parameters:
        - in: query
          name: active
          schema:
            type: boolean
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Clientes filtrados
